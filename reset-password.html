<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Password | Enterprise PMO Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="resetTitle">
        <div class="brand auth-brand">
          <span class="brand-mark">EP</span>
          <span>
            <strong>Enterprise PMO</strong>
            <small>Workbook Dashboard</small>
          </span>
        </div>
        <div>
          <p class="eyebrow">Password Recovery</p>
          <h1 id="resetTitle">Create new password</h1>
        </div>
        <form class="auth-form" id="resetForm">
          <label>
            <span>New Password</span>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>
            <span>Confirm New Password</span>
            <input id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit">Save Password</button>
          <p class="auth-message" id="resetMessage" role="status"></p>
          <a class="auth-link" href="/login.html">Return to login</a>
        </form>
      </section>
    </main>
    <script>
      const form = document.querySelector('#resetForm');
      const message = document.querySelector('#resetMessage');
      const resetToken = new URLSearchParams(location.search).get('token') || '';

      if (!resetToken) {
        message.textContent = 'Reset session is missing. Request a new verification code.';
        form.querySelector('button').disabled = true;
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        message.classList.remove('success');
        message.textContent = '';

        if (form.password.value.length < 8) {
          message.textContent = 'Password must be at least 8 characters.';
          return;
        }

        if (form.password.value !== form.confirm_password.value) {
          message.textContent = 'Passwords do not match.';
          return;
        }

        const button = form.querySelector('button');
        button.disabled = true;
        button.textContent = 'Saving...';

        try {
          const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              reset_token: resetToken,
              password: form.password.value,
              confirm_password: form.confirm_password.value
            })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Password reset failed.');
          location.href = '/login.html?reset=success';
        } catch (error) {
          message.textContent = error.message;
          button.disabled = false;
          button.textContent = 'Save Password';
        }
      });
    </script>
  </body>
</html>
