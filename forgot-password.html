<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | Enterprise PMO Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="forgotTitle">
        <div class="brand auth-brand">
          <span class="brand-mark">EP</span>
          <span>
            <strong>Enterprise PMO</strong>
            <small>Workbook Dashboard</small>
          </span>
        </div>
        <div>
          <p class="eyebrow">Password Recovery</p>
          <h1 id="forgotTitle">Forgot password</h1>
        </div>
        <form class="auth-form" id="forgotForm">
          <label>
            <span>Email Address</span>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@gmail.com" required>
          </label>
          <button type="submit">Send Code</button>
        </form>
        <form class="auth-form" id="codeForm" hidden>
          <label>
            <span>Verification Code</span>
            <input id="code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
          </label>
          <button type="submit">Verify Code</button>
        </form>
        <p class="auth-message success" id="forgotMessage" role="status"></p>
        <a class="auth-link" href="/login.html">Return to login</a>
      </section>
    </main>
    <script>
      const form = document.querySelector('#forgotForm');
      const codeForm = document.querySelector('#codeForm');
      const message = document.querySelector('#forgotMessage');
      let resetEmail = '';

      form.addEventListener('submit', async event => {
        event.preventDefault();
        message.classList.remove('success');
        message.textContent = '';
        const button = form.querySelector('button');
        button.disabled = true;
        button.textContent = 'Sending...';

        try {
          const response = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: form.email.value.trim() })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Password recovery failed.');
          resetEmail = form.email.value.trim();
          form.hidden = true;
          codeForm.hidden = false;
          message.classList.add('success');
          message.textContent = 'We sent a verification code to your email.';
        } catch (error) {
          message.textContent = error.message;
        } finally {
          button.disabled = false;
          button.textContent = 'Send Code';
        }
      });

      codeForm.addEventListener('submit', async event => {
        event.preventDefault();
        message.classList.remove('success');
        message.textContent = '';
        const button = codeForm.querySelector('button');
        button.disabled = true;
        button.textContent = 'Verifying...';

        try {
          const response = await fetch('/api/verify-reset-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: resetEmail,
              code: codeForm.code.value.trim()
            })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || 'Verification failed.');
          location.href = `/reset-password.html?token=${encodeURIComponent(payload.reset_token)}`;
        } catch (error) {
          message.textContent = error.message;
          button.disabled = false;
          button.textContent = 'Verify Code';
        }
      });
    </script>
  </body>
</html>
